version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports: ["8000:8000"]
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    volumes:
      - hf-cache:/app/hf_cache

  frontend:
    build:
      context: .
      args:
        VITE_RASAD_API_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    ports: ["8080:8080"]
    depends_on:
      - backend

volumes:
  redis-data:
  hf-cache:
